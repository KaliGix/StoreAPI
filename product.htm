<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>product viewer</title>
    <link rel="stylesheet" href="styles/style.css" />

    <style>
    .container-products {
      width: 100%;
    }
    .card {
      width: 900px;
      height: 700px;
   
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      align-items: center;
      gap: 20px;
    }

    #resultsContainer {
      position: absolute;
      top: 11%;
      left: 20;
      width: 600px;
      background: white;
      border: 1px solid #ccc;
      max-height: 200px;
      overflow-y: auto;
      border-radius: 5px;
      
    }

    .hidden {
      display: none;
    }

    .result-item{
      cursor: pointer;
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;

    }

     .result-item:hover{
      background-color: #ccc;

     }

    .product-title {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .description{
      font-size: 30px !important;
      line-height: 0.9 !important;
    }

    .product-image img {
      width: 100%;
      height: 600px;
    }

    .product-info .price,
    .product-info .rating,
    .product-info {
      font-size: 50px;
    }
  </style>
  </head>
  <body>
    <header class="nav">
      <section class="logo">
        <a href="index.htm">
          <img
            src="resources/Logo with Shopping Bag and Tech Design.png"
            alt="logo of the company"
          />
        </a>
      </section>

      <section class="search">
        <input
          type="text"
          id="find-product"
          placeholder="type your product"
          autocomplete="off"
        />
        <img src="resources/lupa.png" id="magnifying_glass" alt="" />
        <div id="resultsContainer" class="hidden"></div>
      </section>

      <section class="account">
        <div class="account-user">
          <img src="resources/userIcon.png" />
          <p>My account</p>
        </div>

        <div class="account-cart">
          <img src="resources/cartIcon.png" />
          <p>my cart</p>
        </div>
      </section>
    </header>

    <main class="container">
      <div class="container-products"></div>
      <div class="load-data">Loading data...</div>
      <div class="error-message"></div>
    </main>

    <footer>
      <p>&copy; copyright 2026 kaligix -all right reserved</p>
    </footer>
  </body>

  <script type="module" src="scripts/product.js"></script>

</html>
