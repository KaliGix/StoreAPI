<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>product viewer</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header class="nav">
        <section class="logo">
            <img src="resources/Logo with Shopping Bag and Tech Design.png" alt="logo of the company">
        </section>

        <section class="search">
                <input type="text"  id="find-product" placeholder="type your product" autocomplete="off">
                <img src="resources/lupa.png" id="magnifying_glass" alt="">
        </section>

        <section class="account">
            <div class="account-user">
                 <img src="resources/userIcon.png">
                  <p>My account</p>
            </div>
           
            <div class="account-cart">
                 <img src="resources/cartIcon.png">
                 <p>my cart</p>
            </div>
           
        </section>
    </header>
</body>

<script src="scripts/app.js"></script>
</html>
